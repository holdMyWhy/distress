const STORAGE_KEY = 'datadxb_deals_v1';
const BUYERS_KEY = 'datadxb_buyers_v1';

function loadAllDeals() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveAllDeals(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function loadAllBuyers() {
  try { return JSON.parse(localStorage.getItem(BUYERS_KEY)) || {}; } catch(e) { return {}; }
}
function saveAllBuyers(data) {
  localStorage.setItem(BUYERS_KEY, JSON.stringify(data));
}

// Add deals for a specific date (won't overwrite other dates)
function addDayDeals(dateStr, deals, buyers) {
  const allDeals = loadAllDeals();
  allDeals[dateStr] = deals;
  saveAllDeals(allDeals);
  if (buyers && buyers.length) {
    const allBuyers = loadAllBuyers();
    allBuyers[dateStr] = buyers;
    saveAllBuyers(allBuyers);
  }
}

// Get sorted date keys (newest first)
function getDateKeys() {
  return Object.keys(loadAllDeals()).sort().reverse();
}

function fmtShort(n, c) {
  if (!n) return '—';
  const v = c === 'USD' ? n * 0.2723 : n;
  const p = c === 'USD' ? '$' : '';
  if (v >= 1e6) return p + (v/1e6).toFixed(1) + 'M';
  if (v >= 1e3) return p + (v/1e3).toFixed(0) + 'K';
  return p + v.toLocaleString();
}

function getDeals() {
  const all = loadAllDeals();
  if (state.selectedDate === 'all') {
    const merged = [];
    const seen = new Set();
    Object.entries(all).sort((a,b) => b[0].localeCompare(a[0])).forEach(([date, deals]) => {
      deals.forEach(d => {
        const key = `${d.community}|${d.title}|${d.price}`;
        if (!seen.has(key)) { seen.add(key); merged.push({...d, date}); }
      });
    });
    return merged;
  }
  return (all[state.selectedDate] || []).map(d => ({...d, date: state.selectedDate}));
}

function getBuyers() {
  const all = loadAllBuyers();
  if (state.selectedDate === 'all') {
    const merged = [];
    Object.values(all).forEach(b => merged.push(...b));
    return merged;
  }
  return all[state.selectedDate] || [];
}

    </div>

    <!-- STATS -->
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px">
      ${[
        {l:'Total Deals',v:filtered.length,color:'var(--fg)'},
        {l:'Total Value',v:fmtShort(totalVal,c),color:'var(--green)'},
        {l:'Avg Discount',v:avgDisc+'%',color:'var(--orange)'},
        {l:'Buyers',v:buyers.length,color:'var(--blue)'},
        {l:'Communities',v:sorted.length,color:'var(--yellow)'},
      ].map((s,i) => `
        <div style="padding:14px 18px;border-radius:10px;background:var(--card);border:1px solid var(--cardborder);animation:fadeIn .4s ease ${i*.06}s both">
          <div class="mono" style="font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px">${s.l}</div>
          <div style="font-family:var(--sans);font-size:22px;font-weight:800;color:${s.color};line-height:1">${s.v}</div>
        </div>
      `).join('')}
    </div>

    <!-- FILTERS -->
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${types.map(t => `<button class="fbtn" onclick="state.typeFilter='${t}';render()" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--sans);background:${state.typeFilter===t?'rgba(0,255,136,.1)':'var(--card)'};color:${state.typeFilter===t?'var(--green)':'var(--dim)'};border:1px solid ${state.typeFilter===t?'rgba(0,255,136,.25)':'var(--cardborder)'}">${t}</button>`).join('')}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <div style="display:flex;border-radius:6px;border:1px solid rgba(255,255,255,.06);overflow:hidden">
          ${['AED','USD'].map(cu => `<button class="fbtn" onclick="state.currency='${cu}';render()" style="padding:5px 12px;background:${c===cu?'rgba(255,255,255,.07)':'transparent'};color:${c===cu?'var(--fg)':'var(--dim)'};font-family:var(--mono);font-size:11px;border:none">${cu}</button>`).join('')}
        </div>
        <button class="fbtn" onclick="state.showBuyers=!state.showBuyers;render()" style="padding:5px 14px;border-radius:20px;font-size:12px;font-family:var(--sans);background:${state.showBuyers?'rgba(90,200,250,.1)':'var(--card)'};color:${state.showBuyers?'var(--blue)':'var(--dim)'};border:1px solid ${state.showBuyers?'rgba(90,200,250,.25)':'var(--cardborder)'}">
          ${state.showBuyers?'Hide':'Show'} Buyers
        </button>
      </div>
    </div>

    <!-- URGENCY FILTERS -->
    <div style="display:flex;gap:5px;margin-bottom:22px;flex-wrap:wrap">
      ${urgencies.map(u => {
        const m = u==='All' ? {label:'All',color:'var(--fg)'} : urgencyMeta[u];
        return `<button class="fbtn" onclick="state.urgencyFilter='${u}';render()" style="padding:4px 12px;border-radius:16px;font-size:11px;font-weight:600;font-family:var(--mono);letter-spacing:.04em;background:${state.urgencyFilter===u?m.color+'15':'transparent'};color:${state.urgencyFilter===u?m.color:'rgba(255,255,255,.25)'};border:1px solid ${state.urgencyFilter===u?m.color+'40':'var(--line)'}">${m.label}</button>`;
      }).join('')}
    </div>

    <!-- BUYERS -->
    ${state.showBuyers ? `
      <div style="margin-bottom:24px;animation:fadeIn .3s ease">
        <div class="mono" style="font-size:11px;color:var(--blue);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--blue)"></div> Active Buyer Requests
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
          ${buyers.map((b,i) => `
            <div style="padding:14px 16px;border-radius:10px;background:rgba(90,200,250,.03);border:1px solid rgba(90,200,250,.1);animation:fadeIn .3s ease ${i*.05}s both">
              <div style="font-family:var(--sans);font-size:13px;font-weight:600;margin-bottom:4px">${b.title}</div>
              <div style="font-family:var(--sans);font-size:12px;color:var(--dim);line-height:1.4;white-space:pre-line">${b.rawExcerpt}</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    <!-- COMMUNITIES -->
    ${sorted.map(([comm, items], ci) => {
      const prices = items.filter(d=>d.price).map(d=>d.price);
      const minP = prices.length ? fmtShort(Math.min(...prices),c) : '—';
      const maxP = prices.length ? fmtShort(Math.max(...prices),c) : '—';
      const isOpen = state.expandedComm === comm;
      const dots = [...new Set(items.map(d=>d.urgency))].map(u => {
        const m = urgencyMeta[u]||urgencyMeta.standard;
        return `<div style="width:6px;height:6px;border-radius:50%;background:${m.color}"></div>`;
      }).join('');

      return `
        <div style="margin-bottom:4px;animation:fadeIn .3s ease ${ci*.03}s both">
          <div class="comm-hdr" onclick="state.expandedComm=state.expandedComm==='${comm}'?null:'${comm}';render()" style="display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-radius:${isOpen?'10px 10px 0 0':'10px'};cursor:pointer;background:var(--card);border:1px solid var(--cardborder);${isOpen?'border-bottom:none;':''}transition:all .15s">
            <div style="display:flex;align-items:center;gap:12px">
              <span style="font-family:var(--sans);font-size:15px;font-weight:700">${comm}</span>
              <span class="mono" style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(0,255,136,.08);color:var(--green)">${items.length}</span>
              <div style="display:flex;gap:4px">${dots}</div>
            </div>
            <div style="display:flex;align-items:center;gap:16px">
              <span class="mono" style="font-size:12px;color:var(--dim)">${minP} — ${maxP}</span>
              <span style="color:rgba(255,255,255,.2);font-size:14px;transition:transform .2s;transform:rotate(${isOpen?'180':'0'}deg)">▾</span>
            </div>
          </div>
          ${isOpen ? `
            <div style="border:1px solid var(--cardborder);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;background:rgba(255,255,255,.01)">
              <div style="display:grid;grid-template-columns:1fr 110px 90px 70px;gap:12px;padding:8px 20px;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--line)">
                <div>Property</div><div style="text-align:right">Price</div><div style="text-align:right">vs OP</div><div></div>
              </div>
              ${items.map((d,i) => {
                const u = urgencyMeta[d.urgency]||urgencyMeta.standard;
                const waMsg = encodeURIComponent(`Hi Viren, I'm interested in this deal from DataDXB:\n\n${d.title} | ${d.community}${d.price?'\nPrice: AED '+d.price.toLocaleString():''}${d.area&&d.area<100000?'\nSize: '+d.area.toLocaleString()+' sqft':''}${d.discount?'\nDiscount: '+d.discount+'% vs OP':''}\n\nPlease share more details.`);
                return `
                  <div class="deal-row" style="padding:14px 20px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 110px 90px 70px;gap:12px;align-items:center;animation:fadeIn .3s ease ${i*.03}s both;transition:background .15s">
                    <div>
                      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">
                        <span style="padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--mono);letter-spacing:.06em;background:${u.bg};color:${u.color};border:1px solid ${u.border}">${u.label}</span>
                        <span style="font-family:var(--sans);font-size:14px;font-weight:600">${d.title}</span>
                        ${d.date && state.selectedDate==='all' ? `<span class="mono" style="font-size:9px;color:rgba(255,255,255,.15)">${d.date}</span>` : ''}
                      </div>
                      <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-family:var(--mono);font-size:11px;color:var(--dim)">
                        ${d.type!=='Apartment'&&d.type!=='Studio'?`<span style="padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)">${d.type}</span>`:''}
                        ${d.area&&d.area<100000?d.area.toLocaleString()+' sqft':''}
                        ${d.view?'<span>·</span><span>'+d.view+'</span>':''}
                        ${d.handover?'<span>·</span><span>HO '+d.handover+'</span>':''}
                        ${d.furnished?'<span>·</span><span>'+d.furnished+'</span>':''}
                      </div>
                    </div>
                    <div style="text-align:right">
                      <div class="mono" style="font-size:16px;font-weight:700;color:${d.price?'var(--fg)':'rgba(255,255,255,.2)'}">${fmtShort(d.price,c)}</div>
                      ${d.opPrice&&d.opPrice!==d.price?`<div class="mono" style="font-size:11px;color:rgba(255,255,255,.2);text-decoration:line-through">OP ${fmtShort(d.opPrice,c)}</div>`:''}
                    </div>
                    <div style="text-align:right">
                      ${d.discount&&d.discount>0?`<span class="mono" style="padding:4px 10px;border-radius:6px;font-size:13px;font-weight:700;color:var(--green);background:rgba(0,255,136,.08)">-${d.discount}%</span>`:`<span class="mono" style="color:rgba(255,255,255,.1);font-size:11px">—</span>`}
                    </div>
                    <div style="text-align:right">
                      <a href="https://wa.me/971585877330?text=${waMsg}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:6px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-family:var(--sans);font-size:11px;font-weight:600;box-shadow:0 1px 6px rgba(37,211,102,.2);white-space:nowrap">
                        ${waIcon('11')} Enquire
                      </a>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
        </div>
      `;
    }).join('')}

    <!-- ADMIN: ADD NEW DAY (password protected) -->
    ${state.adminUnlocked ? `
      <div style="margin-top:32px">
        <button class="fbtn" onclick="state.showAdmin=!state.showAdmin;render()" style="padding:8px 16px;border-radius:8px;font-family:var(--mono);font-size:11px;background:rgba(0,255,136,.03);color:rgba(0,255,136,.3);border:1px dashed rgba(0,255,136,.15)">
          ${state.showAdmin ? '▾ Hide' : '▸ Add New Day'} (Admin)
        </button>
      </div>
      ${state.showAdmin ? `
        <div class="admin-panel" style="margin-top:8px">
          <div style="font-family:var(--sans);font-size:13px;font-weight:600;margin-bottom:4px;color:var(--green)">Add New Day's Deals</div>
          <div class="mono" style="font-size:11px;color:var(--dim);margin-bottom:12px">Paste the JSON array of deals below. Old data is never overwritten.</div>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="admin-date" type="date" value="" style="padding:6px 12px;border-radius:6px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);color:var(--fg);font-family:var(--mono);font-size:12px" />
          </div>
          <textarea id="admin-json" placeholder='Paste deals JSON array here...'></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="admin-btn" onclick="importDeals()" style="background:var(--green);color:#000">Import Deals</button>
            <button class="admin-btn" onclick="exportAll()" style="background:rgba(255,255,255,.06);color:var(--fg)">Export All Data</button>
            <button class="admin-btn" onclick="state.adminUnlocked=false;state.showAdmin=false;render()" style="background:rgba(255,59,48,.1);color:var(--red)">Lock Admin</button>
            <span id="admin-msg" class="mono" style="font-size:11px;color:var(--green);align-self:center;margin-left:8px"></span>
          </div>
        </div>
      ` : ''}
    ` : ''}

    <!-- CTA -->
    <div style="margin-top:32px;padding:24px 28px;border-radius:12px;background:linear-gradient(135deg,rgba(37,211,102,.06),rgba(18,140,126,.06));border:1px solid rgba(37,211,102,.12);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:3px">Get these deals in real-time</div>
        <div style="font-family:var(--sans);font-size:12px;color:var(--dim)">Join Viren's WhatsApp channel — first-mover access for HNW investors.</div>
      </div>
      <a href="https://whatsapp.com/channel/0029Vb7gUWy9sBID7CdKJr0A" target="_blank" style="padding:10px 24px;border-radius:8px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;box-shadow:0 3px 16px rgba(37,211,102,.25);display:flex;align-items:center;gap:8px">
        ${waIcon('16')} Join Channel
      </a>
    </div>

    <!-- FOOTER -->
    <div style="margin-top:36px;padding-top:18px;border-top:1px solid var(--line);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-family:var(--mono);font-size:10px;color:var(--dimmer)">
      <span>© 2026 DataDXB · Viren · RERA Licensed</span>
      <span>${dates.length} day(s) stored · ${Object.values(loadAllDeals()).flat().length} total entries</span>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════
// ADMIN FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function importDeals() {
  const dateEl = document.getElementById('admin-date');
  const jsonEl = document.getElementById('admin-json');
  const msgEl = document.getElementById('admin-msg');
  if (!dateEl.value) { msgEl.textContent = '⚠ Enter a date'; return; }
  try {
    const data = JSON.parse(jsonEl.value);
    if (!Array.isArray(data)) throw new Error('Must be array');
    addDayDeals(dateEl.value, data, []);
    msgEl.textContent = `✓ Imported ${data.length} deals for ${dateEl.value}`;
    state.selectedDate = dateEl.value;
    setTimeout(render, 800);
  } catch(e) {
    msgEl.textContent = '⚠ Invalid JSON: ' + e.message;
  }
}

function exportAll() {
  const data = { deals: loadAllDeals(), buyers: loadAllBuyers() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'datadxb-export.json'; a.click();
  URL.revokeObjectURL(url);
}

// Initial render
render();
</script>
</body>
</html>
